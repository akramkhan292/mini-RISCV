<svg xmlns="http://www.w3.org/2000/svg" width="1480" height="900" viewBox="0 0 1480 900" role="img" aria-labelledby="title desc">
  <title id="title">RV32I five-stage pipeline block diagram</title>
  <desc id="desc">Clean block diagram showing the IF, ID, EX, MEM, and WB stages, four pipeline registers, forwarding paths, load-use stall control, redirect flushing, and retirement output.</desc>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2563eb"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#d97706"/>
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#7c3aed"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <style>
      .title { font: 700 30px ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; fill: #0f172a; }
      .subtitle { font: 400 15px ui-sans-serif, system-ui, sans-serif; fill: #475569; }
      .stage-title { font: 700 19px ui-sans-serif, system-ui, sans-serif; fill: #166534; }
      .body { font: 400 14px ui-sans-serif, system-ui, sans-serif; fill: #334155; }
      .small { font: 400 12px ui-sans-serif, system-ui, sans-serif; fill: #475569; }
      .pipe-title { font: 700 14px ui-sans-serif, system-ui, sans-serif; fill: #1e3a8a; }
      .pipe-text { font: 400 11px ui-sans-serif, system-ui, sans-serif; fill: #1e40af; }
      .label { font: 600 12px ui-sans-serif, system-ui, sans-serif; fill: #334155; }
      .blue-label { font: 600 12px ui-sans-serif, system-ui, sans-serif; fill: #1d4ed8; }
      .orange-label { font: 600 12px ui-sans-serif, system-ui, sans-serif; fill: #b45309; }
      .purple-label { font: 600 12px ui-sans-serif, system-ui, sans-serif; fill: #6d28d9; }
      .stage { fill: #f0fdf4; stroke: #22c55e; stroke-width: 2.2; rx: 14; filter: url(#shadow); }
      .pipe { fill: #dbeafe; stroke: #2563eb; stroke-width: 2.4; rx: 9; filter: url(#shadow); }
      .hazard { fill: #fffbeb; stroke: #d97706; stroke-width: 2.4; rx: 14; filter: url(#shadow); }
      .retire { fill: #faf5ff; stroke: #7c3aed; stroke-width: 2.4; rx: 12; filter: url(#shadow); }
      .separator { stroke: #86efac; stroke-width: 1.5; }
      .data { fill: none; stroke: #334155; stroke-width: 2.8; marker-end: url(#arrow); }
      .forward { fill: none; stroke: #2563eb; stroke-width: 2.8; marker-end: url(#arrowBlue); }
      .control { fill: none; stroke: #d97706; stroke-width: 2.8; stroke-dasharray: 8 6; marker-end: url(#arrowOrange); }
      .retire-line { fill: none; stroke: #7c3aed; stroke-width: 2.8; marker-end: url(#arrowPurple); }
    </style>
  </defs>

  <rect width="1480" height="900" fill="#f8fafc"/>
  <text x="40" y="45" class="title">RV32I In-Order Five-Stage Pipeline</text>
  <text x="40" y="72" class="subtitle">Main datapath on top · forwarding in blue · stall, bubble, flush, and redirect control in orange</text>

  <!-- EX redirect path, deliberately isolated above the datapath -->
  <path d="M745 175 V112 H145 V175" class="control"/>
  <text x="445" y="102" text-anchor="middle" class="orange-label">EX redirect target: taken branch / JAL / JALR</text>

  <!-- IF stage -->
  <rect x="40" y="175" width="210" height="255" class="stage"/>
  <text x="145" y="210" text-anchor="middle" class="stage-title">IF — Fetch</text>
  <line x1="60" y1="225" x2="230" y2="225" class="separator"/>
  <text x="65" y="260" class="body">• PC register with enable</text>
  <text x="65" y="292" class="body">• Instruction memory</text>
  <text x="65" y="324" class="body">• Sequential PC + 4</text>
  <text x="65" y="356" class="body">• Next-PC selection</text>
  <text x="65" y="397" class="small">Normal: current IF PC + 4</text>
  <text x="65" y="416" class="small">Redirect: target resolved in EX</text>

  <!-- IF/ID -->
  <rect x="270" y="185" width="55" height="235" class="pipe"/>
  <text x="297" y="218" text-anchor="middle" class="pipe-title">IF/ID</text>
  <text x="297" y="255" text-anchor="middle" class="pipe-text">valid</text>
  <text x="297" y="278" text-anchor="middle" class="pipe-text">PC</text>
  <text x="297" y="301" text-anchor="middle" class="pipe-text">instr</text>
  <text x="297" y="350" text-anchor="middle" class="pipe-text">hold</text>
  <text x="297" y="373" text-anchor="middle" class="pipe-text">flush</text>

  <!-- ID stage -->
  <rect x="345" y="175" width="210" height="255" class="stage"/>
  <text x="450" y="210" text-anchor="middle" class="stage-title">ID — Decode</text>
  <line x1="365" y1="225" x2="535" y2="225" class="separator"/>
  <text x="370" y="260" class="body">• Instruction decode</text>
  <text x="370" y="292" class="body">• Control + immediate</text>
  <text x="370" y="324" class="body">• Register-file reads</text>
  <text x="370" y="356" class="body">• Source-use detection</text>
  <text x="370" y="397" class="small">Same-cycle WB value bypasses</text>
  <text x="370" y="416" class="small">the old register-file value</text>

  <!-- ID/EX -->
  <rect x="575" y="185" width="55" height="235" class="pipe"/>
  <text x="602" y="218" text-anchor="middle" class="pipe-title">ID/EX</text>
  <text x="602" y="250" text-anchor="middle" class="pipe-text">valid</text>
  <text x="602" y="273" text-anchor="middle" class="pipe-text">PC</text>
  <text x="602" y="296" text-anchor="middle" class="pipe-text">ops</text>
  <text x="602" y="319" text-anchor="middle" class="pipe-text">rs/rd</text>
  <text x="602" y="342" text-anchor="middle" class="pipe-text">imm</text>
  <text x="602" y="365" text-anchor="middle" class="pipe-text">ctrl</text>
  <text x="602" y="396" text-anchor="middle" class="pipe-text">bubble</text>

  <!-- EX stage -->
  <rect x="650" y="175" width="210" height="255" class="stage"/>
  <text x="755" y="210" text-anchor="middle" class="stage-title">EX — Execute</text>
  <line x1="670" y1="225" x2="840" y2="225" class="separator"/>
  <text x="675" y="260" class="body">• Forwarding muxes</text>
  <text x="675" y="292" class="body">• ALU / comparison</text>
  <text x="675" y="324" class="body">• Store-data forwarding</text>
  <text x="675" y="356" class="body">• Branch and jump resolve</text>
  <text x="675" y="397" class="small">EX/MEM has priority over</text>
  <text x="675" y="416" class="small">the older MEM/WB value</text>

  <!-- EX/MEM -->
  <rect x="880" y="185" width="55" height="235" class="pipe"/>
  <text x="907" y="218" text-anchor="middle" class="pipe-title">EX/</text>
  <text x="907" y="236" text-anchor="middle" class="pipe-title">MEM</text>
  <text x="907" y="270" text-anchor="middle" class="pipe-text">valid</text>
  <text x="907" y="293" text-anchor="middle" class="pipe-text">ALU</text>
  <text x="907" y="316" text-anchor="middle" class="pipe-text">store</text>
  <text x="907" y="339" text-anchor="middle" class="pipe-text">rd</text>
  <text x="907" y="362" text-anchor="middle" class="pipe-text">ctrl</text>

  <!-- MEM stage -->
  <rect x="955" y="175" width="190" height="255" class="stage"/>
  <text x="1050" y="210" text-anchor="middle" class="stage-title">MEM — Memory</text>
  <line x1="975" y1="225" x2="1125" y2="225" class="separator"/>
  <text x="980" y="260" class="body">• Data memory</text>
  <text x="980" y="292" class="body">• SB / SH / SW lanes</text>
  <text x="980" y="324" class="body">• Load lane selection</text>
  <text x="980" y="356" class="body">• Sign / zero extension</text>
  <text x="980" y="397" class="small">Stores update memory here;</text>
  <text x="980" y="416" class="small">metadata continues to WB</text>

  <!-- MEM/WB -->
  <rect x="1165" y="185" width="55" height="235" class="pipe"/>
  <text x="1192" y="218" text-anchor="middle" class="pipe-title">MEM/</text>
  <text x="1192" y="236" text-anchor="middle" class="pipe-title">WB</text>
  <text x="1192" y="270" text-anchor="middle" class="pipe-text">valid</text>
  <text x="1192" y="293" text-anchor="middle" class="pipe-text">ALU</text>
  <text x="1192" y="316" text-anchor="middle" class="pipe-text">load</text>
  <text x="1192" y="339" text-anchor="middle" class="pipe-text">wb_rd</text>
  <text x="1192" y="362" text-anchor="middle" class="pipe-text">meta</text>

  <!-- WB stage -->
  <rect x="1240" y="175" width="200" height="255" class="stage"/>
  <text x="1340" y="210" text-anchor="middle" class="stage-title">WB — Writeback</text>
  <line x1="1260" y1="225" x2="1420" y2="225" class="separator"/>
  <text x="1265" y="260" class="body">• Select ALU / load / PC+4</text>
  <text x="1265" y="292" class="body">• Write address = wb_rd</text>
  <text x="1265" y="324" class="body">• Write data = wb_data</text>
  <text x="1265" y="356" class="body">• Valid-gated side effects</text>
  <text x="1265" y="397" class="small">Enable, data, and destination</text>
  <text x="1265" y="416" class="small">belong to one instruction</text>

  <!-- Main datapath -->
  <path d="M250 302 H270" class="data"/>
  <path d="M325 302 H345" class="data"/>
  <path d="M555 302 H575" class="data"/>
  <path d="M630 302 H650" class="data"/>
  <path d="M860 302 H880" class="data"/>
  <path d="M935 302 H955" class="data"/>
  <path d="M1145 302 H1165" class="data"/>
  <path d="M1220 302 H1240" class="data"/>

  <!-- Forwarding band -->
  <path d="M907 420 V495 H730 V430" class="forward"/>
  <text x="810" y="486" text-anchor="middle" class="blue-label">EX/MEM forward</text>

  <path d="M1192 420 V540 H790 V430" class="forward"/>
  <text x="990" y="531" text-anchor="middle" class="blue-label">MEM/WB forward</text>

  <path d="M1270 430 V585 H450 V430" class="forward"/>
  <text x="860" y="576" text-anchor="middle" class="blue-label">WB-to-ID bypass: wb_rd + wb_data</text>

  <!-- Retirement output kept separate from the datapath -->
  <rect x="1235" y="500" width="210" height="105" class="retire"/>
  <text x="1340" y="530" text-anchor="middle" class="stage-title" style="fill:#6d28d9">Retirement / Debug</text>
  <text x="1340" y="557" text-anchor="middle" class="body">valid · PC · instruction</text>
  <text x="1340" y="580" text-anchor="middle" class="body">register + store side effects</text>
  <path d="M1340 430 V500" class="retire-line"/>

  <!-- Hazard unit and its three clean outputs -->
  <rect x="310" y="680" width="780" height="130" class="hazard"/>
  <text x="700" y="714" text-anchor="middle" class="stage-title" style="fill:#b45309">Hazard and Pipeline Control</text>
  <text x="700" y="744" text-anchor="middle" class="body">Detect: valid EX load rd matches a true ID rs1 or rs2 source</text>
  <text x="700" y="771" text-anchor="middle" class="body">Load-use → hold PC + IF/ID, insert one ID/EX bubble</text>
  <text x="700" y="798" text-anchor="middle" class="body">EX redirect → update PC target, flush IF/ID + ID/EX; redirect has priority</text>

  <path d="M425 680 V635 H145 V430" class="control"/>
  <text x="225" y="626" text-anchor="middle" class="orange-label">PC enable / hold</text>

  <path d="M610 680 V635 H297 V420" class="control"/>
  <text x="445" y="626" text-anchor="middle" class="orange-label">IF/ID hold / flush</text>

  <path d="M795 680 V635 H602 V420" class="control"/>
  <text x="700" y="626" text-anchor="middle" class="orange-label">ID/EX bubble / flush</text>

  <!-- Legend -->
  <line x1="55" y1="858" x2="105" y2="858" class="data"/>
  <text x="120" y="863" class="label">primary datapath</text>
  <line x1="300" y1="858" x2="350" y2="858" class="forward"/>
  <text x="365" y="863" class="blue-label">forwarding / bypass</text>
  <line x1="585" y1="858" x2="635" y2="858" class="control"/>
  <text x="650" y="863" class="orange-label">stall / flush / redirect</text>
  <rect x="875" y="845" width="28" height="24" class="pipe"/>
  <text x="918" y="863" class="blue-label">pipeline register + valid bit</text>
  <text x="1165" y="863" class="subtitle">Implemented RTL view</text>
</svg>
